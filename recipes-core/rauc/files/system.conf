[system]
compatible=RaspberryPi5
# No U-Boot on Pi 5 (no BCM2712 PCIe driver). Slot selection is done through the
# RPi firmware tryboot mechanism via the custom backend handler below.
bootloader=custom

[keyring]
path=/etc/rauc/ca.cert.pem

[handlers]
# Implements: get-primary | set-primary <bootname> | get-state <bootname> |
#             set-state <bootname> good|bad   (edits autoboot.txt on /dev/nvme0n1p1)
bootloader-custom-backend=/usr/lib/rauc/tryboot-backend.sh

# A/B slot groups: each group is a vfat boot slot (the tryboot target) plus its
# ext4 rootfs child. bootname A -> boot_partition 2, B -> boot_partition 3.
[slot.boot.0]
device=/dev/nvme0n1p2
type=vfat
bootname=A

[slot.rootfs.0]
device=/dev/nvme0n1p4
type=ext4
parent=boot.0

[slot.boot.1]
device=/dev/nvme0n1p3
type=vfat
bootname=B

[slot.rootfs.1]
device=/dev/nvme0n1p5
type=ext4
parent=boot.1
