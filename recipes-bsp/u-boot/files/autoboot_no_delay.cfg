# U-Boot Kconfig fragment — referenced by the moto-timo/meta-raspberrypi
# scarthgap u-boot bbappend (SRC_URI:append:raspberrypi5) but missing from that
# branch. We do NOT boot via U-Boot on Pi 5 (no BCM2712 PCIe driver — see
# rauc/files/system.conf), but the u-boot recipe is still PARSED, and bitbake
# computes SRC_URI checksums at parse time for every recipe. This file must
# therefore exist or parsing fails, even though u-boot is never built.
CONFIG_BOOTDELAY=0
