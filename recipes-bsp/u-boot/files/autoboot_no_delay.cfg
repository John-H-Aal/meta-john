# U-Boot Kconfig fragment — disable autoboot delay for Raspberry Pi 5
# Referenced by moto-timo/meta-raspberrypi scarthgap branch but missing
# from that branch; provided here so the bbappend can resolve it.
# BOOTDELAY=0: U-Boot boots immediately without waiting for console interrupt.
# This is correct for RAUC A/B: the boot script runs unconditionally.
CONFIG_BOOTDELAY=0
