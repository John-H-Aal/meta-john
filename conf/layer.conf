# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "john"
BBFILE_PATTERN_john = "^${LAYERDIR}/"
BBFILE_PRIORITY_john = "6"

LAYERDEPENDS_john = "core raspberrypi"
LAYERSERIES_COMPAT_john = "scarthgap"
